# Nginx site config for yehthatrocks.com
# Install: sudo cp deploy/nginx/yehthatrocks.conf /etc/nginx/sites-available/yehthatrocks
#          sudo ln -sf /etc/nginx/sites-available/yehthatrocks /etc/nginx/sites-enabled/yehthatrocks
#          sudo nginx -t && sudo systemctl reload nginx

server {
    server_name yehthatrocks.com www.yehthatrocks.com;

    # Explicit compression for text assets and JSON responses.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Static assets served directly by Nginx (logo, favicons) so the
    # maintenance page renders even when the app container is completely down.
    location /images/ {
        alias /srv/yehthatrocks/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /favicons/ {
        alias /srv/yehthatrocks/favicons/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Surface maintenance page on any upstream error.
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    location = /maintenance.html {
        root /srv/yehthatrocks/deploy/nginx;
        internal;
        add_header Retry-After 10;
        add_header Cache-Control "no-store";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/yehthatrocks.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yehthatrocks.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.yehthatrocks.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = yehthatrocks.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name yehthatrocks.com www.yehthatrocks.com;
    return 404; # managed by Certbot
}
