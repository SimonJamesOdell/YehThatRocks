# Nginx site config for yehthatrocks.com
# Install: sudo cp deploy/nginx/yehthatrocks.conf /etc/nginx/sites-available/yehthatrocks
#          sudo ln -sf /etc/nginx/sites-available/yehthatrocks /etc/nginx/sites-enabled/yehthatrocks
#          sudo nginx -t && sudo systemctl reload nginx

server {
    server_name yehthatrocks.com www.yehthatrocks.com;

    access_log /var/log/nginx/access.log ytr_timed;

    # Explicit compression for text assets and JSON responses.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Static assets served directly by Nginx (logo, favicons) so the
    # maintenance page renders even when the app container is completely down.
    location /images/ {
        alias /srv/yehthatrocks/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /favicons/ {
        alias /srv/yehthatrocks/favicons/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next static build assets are content-addressed and safe to cache long-term.
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    # Keep favicon cacheable with a bounded TTL so updates eventually refresh.
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    location = /api/analytics {
        set $block_low_value_analytics_bot 0;

        if ($request_method = POST) {
            set $block_low_value_analytics_bot "${block_low_value_analytics_bot}1";
        }

        if ($http_user_agent ~* "(meta-externalagent|meta-externalfetcher|metaexternalhit|facebookexternalhit|facebookcatalog|Googlebot|Google-InspectionTool|Bingbot|BingPreview|LinkedInBot|Twitterbot|Slackbot|Discordbot|DuckDuckBot|redditbot|applebot|SkypeUriPreview|WhatsApp|ia_archiver|GPTBot|vkShare|quora link preview)") {
            set $block_low_value_analytics_bot "${block_low_value_analytics_bot}1";
        }

        if ($block_low_value_analytics_bot = "011") {
            return 204;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    location = /api/videos/unavailable {
        set $block_low_value_unavailable_bot 0;

        if ($request_method = POST) {
            set $block_low_value_unavailable_bot "${block_low_value_unavailable_bot}1";
        }

        if ($http_user_agent ~* "(meta-externalagent|meta-externalfetcher|metaexternalhit|facebookexternalhit|facebookcatalog|Googlebot|Google-InspectionTool|Bingbot|BingPreview|LinkedInBot|Twitterbot|Slackbot|Discordbot|DuckDuckBot|redditbot|applebot|SkypeUriPreview|WhatsApp|ia_archiver|GPTBot|vkShare|quora link preview)") {
            set $block_low_value_unavailable_bot "${block_low_value_unavailable_bot}1";
        }

        if ($block_low_value_unavailable_bot = "011") {
            return 403;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Surface maintenance page on any upstream error.
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }

    location = /maintenance.html {
        root /srv/yehthatrocks/deploy/nginx;
        internal;
        add_header Retry-After 10;
        add_header Cache-Control "no-store";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/yehthatrocks.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yehthatrocks.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.yehthatrocks.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = yehthatrocks.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name yehthatrocks.com www.yehthatrocks.com;
    return 404; # managed by Certbot
}
