<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YehThatRocks — Back in a moment</title>
  <link rel="icon" href="/favicons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #f5f1eb;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.4rem;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: min(560px, 88vw);
      height: auto;
      filter: drop-shadow(0 0 18px rgba(179, 18, 20, 0.55));
    }

    .message {
      font-family: 'Metal Mania', cursive;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: #f5f1eb;
      text-shadow: 0 0 12px rgba(179, 18, 20, 0.6);
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 600;
      color: #d3c1b8;
      max-width: 40ch;
      line-height: 1.6;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #b31214;
      box-shadow: 0 0 0 0 rgba(179, 18, 20, 0.7);
      animation: pulse 1.6s ease-in-out infinite;
      margin: 0 auto;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   box-shadow: 0 0 0 0   rgba(179,18,20,0.7); }
      50%  { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(179,18,20,0);   }
      100% { transform: scale(1);   box-shadow: 0 0 0 0   rgba(179,18,20,0);    }
    }

    .divider {
      width: min(320px, 70vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(179,18,20,0.5), transparent);
    }
  </style>
</head>
<body>
  <img class="logo" src="/images/yeh3.png" alt="YehThatRocks" />
  <div class="divider"></div>
  <p class="message">We&rsquo;re updating the site</p>
  <p class="sub">We&rsquo;ll be back shortly. This page will reload automatically the moment we&rsquo;re live again.</p>
  <div class="pulse"></div>
  <p class="countdown" id="countdown"></p>
  <script>
    (function () {
      var CHECK_INTERVAL_MS = 5000;
      var BACKOFF_MAX_MS = 30000;
      var interval = CHECK_INTERVAL_MS;
      var timer = null;

      function check() {
        fetch('/api/status', { method: 'GET', cache: 'no-store' })
          .then(function (res) {
            if (res.ok) {
              window.location.reload();
            } else {
              schedule();
            }
          })
          .catch(function () {
            schedule();
          });
      }

      function schedule() {
        interval = Math.min(interval * 1.5, BACKOFF_MAX_MS);
        clearTimeout(timer);
        timer = setTimeout(check, interval);
      }

      // Start first check after initial interval
      timer = setTimeout(check, CHECK_INTERVAL_MS);
    })();
  </script>
</body>
</html>
